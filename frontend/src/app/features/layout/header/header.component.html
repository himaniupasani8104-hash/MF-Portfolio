<header class="top-header">
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="text" placeholder="Search clients, transactions, reports...">
    <span class="shortcut">⌘K</span>
  </div>

  <div class="header-actions">
    <button class="action-btn outline">📅 Today</button>
    <button class="action-btn primary">+ Quick Action</button>

    <div class="icon-group">
      <button class="icon-btn notification">🔔<span class="badge">3</span></button>
      <button class="icon-btn">💬</button>
      <button class="icon-btn">🌓</button>
    </div>

    <div class="profile-wrapper">
      <div class="user-profile" (click)="toggleProfileMenu($event)">
        <div class="avatar">{{ userInitials }}</div>
        <div class="user-info">
          <span class="user-name">{{ userName }}</span>
          <span class="user-role">{{ userRole }}</span>
        </div>
      </div>

      <div class="profile-menu" [class.open]="isProfileMenuOpen" (click)="$event.stopPropagation()">
        <button class="profile-menu-item" routerLink="/my-profile">
          <span class="menu-icon">👤</span>
          <span>My Profile</span>
        </button>

        <button class="profile-menu-item">
          <span class="menu-icon">🔔</span>
          <span>My Subscriptions</span>
        </button>

        <button class="profile-menu-item">
          <span class="menu-icon">🛒</span>
          <span>Add New Products</span>
        </button>

        <button class="profile-menu-item" routerLink="/change-password">
          <span class="menu-icon">🔑</span>
          <span>Change Password</span>
        </button>

        <button class="profile-menu-item">
          <span class="menu-icon">↩</span>
          <span>My Login History</span>
        </button>

        <button class="profile-menu-item">
          <span class="menu-icon">🚩</span>
          <span>Privacy Policy &amp; Other</span>
        </button>

        <div class="profile-menu-divider"></div>

        <button class="profile-menu-item">
          <span class="menu-icon">🔧</span>
          <span>Theme Settings</span>
        </button>

        <button class="profile-menu-item">
          <span class="menu-icon">🎁</span>
          <span>Invite Friends / IFAs</span>
        </button>

        <button class="profile-menu-item logout">
          <span class="menu-icon">🔐</span>
          <span>Log Out</span>
        </button>
      </div>
    </div>
  </div>
</header>
