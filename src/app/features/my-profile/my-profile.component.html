          </div>
        </div>
        <div class="form-row">
          <label>GST Number</label>
          <div class="form-controls">
            <input type="text" [(ngModel)]="profile.billingGst" name="billingGst" placeholder="Optional" class="wide">
          </div>
        </div>
        <div class="form-row">
          <label>City</label>
          <div class="form-controls">
            <input type="text" [(ngModel)]="profile.billingCity" name="billingCity" class="wide">
          </div>
        </div>
        <div class="form-row">
          <label>Pincode</label>
          <div class="form-controls">
            <input type="text" [(ngModel)]="profile.billingPincode" name="billingPincode" class="wide">
          </div>
        </div>
        <div class="form-row">
          <label>State</label>
          <div class="form-controls">
            <select [(ngModel)]="profile.billingState" name="billingState" class="wide">
              <option>Maharashtra</option>
              <option>Gujarat</option>
              <option>Delhi</option>
              <option>Karnataka</option>
              <option>Tamil Nadu</option>
            </select>
          </div>
        </div>
      </ng-container>

      <ng-container *ngIf="currentStep === 4">
        <div class="form-row">
          <label>Client Default Password</label>
          <div class="form-controls form-inline-group">
            <input type="text" [(ngModel)]="profile.clientDefaultPassword" name="clientDefaultPassword" class="main-input">
            <span class="hint-text">Type Password</span>
          </div>
        </div>

        <div class="form-row">
          <label>SMS Suffix</label>
          <div class="form-controls">
            <input type="text" [(ngModel)]="profile.smsSuffix" name="smsSuffix" class="wide">
          </div>
        </div>

        <div class="form-row">
          <label>Google Play Store Link</label>
          <div class="form-controls">
            <input type="text" [(ngModel)]="profile.playStoreLink" name="playStoreLink" class="wide">
          </div>
        </div>

        <div class="form-row align-top">
          <label>Email Signature</label>
          <div class="form-controls">
            <textarea [(ngModel)]="profile.emailSignature" name="emailSignature" class="wide textarea rich-textarea"></textarea>
          </div>
        </div>

        <div class="form-row align-top">
          <label>Email Disclaimer</label>
          <div class="form-controls">
            <textarea [(ngModel)]="profile.emailDisclaimer" name="emailDisclaimer" class="wide textarea"></textarea>
          </div>
        </div>

        <div class="form-row align-top">
          <label>PDF Disclaimer</label>
          <div class="form-controls">
            <textarea [(ngModel)]="profile.pdfDisclaimer" name="pdfDisclaimer" class="wide textarea"></textarea>
          </div>
        </div>

        <div class="form-row">
          <label>Firm Title</label>
          <div class="form-controls">
            <input type="text" [(ngModel)]="profile.firmTitle" name="firmTitle" class="wide">
          </div>
        </div>

        <div class="form-row">
          <label>Firm Sub Title</label>
          <div class="form-controls">
            <input type="text" [(ngModel)]="profile.firmSubTitle" name="firmSubTitle" class="wide" placeholder="Firm Title and Firm Subtitle combine length should not be more than 25 characters">
          </div>
        </div>

        <div class="form-row multi-select-row">
          <div class="select-group">
            <label>Preferred Columns</label>
            <select [(ngModel)]="profile.preferredColumns" name="preferredColumns" class="standard-select">
              <option value="17">17 selected</option>
              <option value="18">18 selected</option>
            </select>
          </div>
          <div class="select-group right-align-group">
            <label>Whatsapp Language</label>
            <select [(ngModel)]="profile.whatsappLanguage" name="whatsappLanguage" class="standard-select">
              <option value="English">English</option>
              <option value="Hindi">Hindi</option>
            </select>
          </div>
        </div>

        <div class="checkbox-grid-section">
          <div class="checkbox-column">
            <label class="custom-checkbox">
              <span class="label-text">Show Key Figures on Dashboard</span>
              <input type="checkbox" [(ngModel)]="profile.showKeyFigures" name="showKeyFigures">
            </label>
            
            <label class="custom-checkbox">
              <span class="label-text">Client Login Email Notification</span>
              <input type="checkbox" [(ngModel)]="profile.clientLoginNotification" name="clientLoginNotification">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">Enable Trxn. Movement Popup</span>
              <input type="checkbox" [(ngModel)]="profile.enableTrxnMovementPopup" name="enableTrxnMovementPopup">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">Enable SMS to Clients</span>
              <input type="checkbox" [(ngModel)]="profile.enableSmsToClients" name="enableSmsToClients">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">Always BCC the Valuation report to me</span>
              <input type="checkbox" [(ngModel)]="profile.alwaysBccValuation" name="alwaysBccValuation">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">Enable Watermark on PDF Reporting</span>
              <input type="checkbox" [(ngModel)]="profile.enableWatermarkPdf" name="enableWatermarkPdf">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">Enable Mailer for Daily Bday/Anniversary List</span>
              <input type="checkbox" [(ngModel)]="profile.enableMailerBday" name="enableMailerBday">
            </label>
          </div>

          <div class="checkbox-column">
             <label class="custom-checkbox spacer-box"></label>
            <label class="custom-checkbox spacer-box"></label>

            <label class="custom-checkbox">
              <span class="label-text">Enable DivP / DivR in Valuation Report</span>
              <input type="checkbox" [(ngModel)]="profile.enableDivP" name="enableDivP">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">Enable Logo for PDF Reporting</span>
              <input type="checkbox" [(ngModel)]="profile.enableLogoPdfReporting" name="enableLogoPdfReporting">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">R&amp;T's Profile Data as Default</span>
              <input type="checkbox" [(ngModel)]="profile.rtProfileDataDefault" name="rtProfileDataDefault">
            </label>

            <label class="custom-checkbox">
              <span class="label-text">Sender as Advisor's default mail</span>
              <input type="checkbox" [(ngModel)]="profile.senderAdvisorDefault" name="senderAdvisorDefault">
            </label>
          </div>
        </div>

      </ng-container>

    </form>

    <div class="form-footer" [ngClass]="{'footer-centered': currentStep === 4}">
      <button *ngIf="currentStep > 1" type="button" class="back-btn" (click)="backProfile()">⨠ Back</button>
      <button *ngIf="currentStep < 4" type="button" class="continue-btn" (click)="continueProfile()">Continue ➜</button>
      
      <button *ngIf="currentStep > 1 && currentStep < 4" type="button" class="save-btn" (click)="saveProfile()">Save ➜</button>
      <button *ngIf="currentStep === 4" type="button" class="submit-btn" (click)="submitProfile()">Submit ➜</button>
    </div>
  </div>
</section>
