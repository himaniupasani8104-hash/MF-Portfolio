<div class="login-page-wrapper">
  <div class="login-card-container">
    <div class="login-card">
      
      <header class="login-header">
        <div class="app-logo">
          <span class="logo-icon">📈</span> 
        </div>
        <h1>MF Admin Portal</h1>
        <p class="subheader">Secure access for advisors and IFAs</p>
      </header>

      <form class="login-form" (ngSubmit)="onSignIn()">
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">✉️</span> 
            <input type="email" id="email" name="email" [(ngModel)]="emailModel" placeholder="admin@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">🔒</span> 
            <input [type]="isPasswordVisible ? 'text' : 'password'" id="password" name="password" [(ngModel)]="passwordModel" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" (click)="isPasswordVisible = !isPasswordVisible">
              {{ isPasswordVisible ? '👁️' : '🕶️' }}
            </button>
          </div>
        </div>

        <div class="form-options">
          <div class="remember-checkbox">
            <input type="checkbox" id="remember" name="remember" [(ngModel)]="rememberMe">
            <label for="remember">Remember Me</label>
          </div>
          <a href="#" class="forgot-link">Forgot Password?</a>
        </div>
        <div class="error-message" *ngIf="errorMessage">
          ⚠️ {{ errorMessage }}
        </div>

        <button type="submit" class="sign-in-btn">Sign In to Dashboard</button>
      
      </form>

      <footer class="login-footer">
        <p>Trusted by advisors managing ₹10,000 + Cr AUM</p>
      </footer>

    </div>
  </div>
</div>
